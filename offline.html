<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#dc4a3a">
  <title>离线模式 - 太鼓谱面难度分析</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #fff5ea 0%, #ffe9d6 52%, #fff2e7 100%);
      color: #7b341f;
    }

    .panel {
      width: min(520px, 92vw);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #f2cfad;
      box-shadow: 0 12px 30px rgba(135, 57, 32, 0.12);
      padding: 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    p {
      margin: 0;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>当前处于离线模式</h1>
    <p>应用外壳已从缓存加载。联网后刷新页面即可获取最新资源与数据。</p>
  </main>
</body>
</html>
